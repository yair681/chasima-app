name: Build Parent APK

on:
  push:
    branches: [master]
    paths:
      - 'apps/parent/**'
      - '.github/workflows/build-parent.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        working-directory: apps/parent
        run: npm install

      - name: Expo prebuild
        working-directory: apps/parent
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_API_URL: https://chasima-app.onrender.com

      - name: Make gradlew executable
        working-directory: apps/parent/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: apps/parent/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: parent-app-${{ github.run_number }}
          path: apps/parent/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
